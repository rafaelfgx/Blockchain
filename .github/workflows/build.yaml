name: build
on:
    push:
        branches: [ main ]
jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: DotNet Setup
              uses: actions/setup-dotnet@v5
              with:
                  global-json-file: Blockchain/global.json

            - name: PNPM Setup
              uses: pnpm/action-setup@v6
              with:
                  version: latest

            - name: Node Setup
              uses: actions/setup-node@v6
              with:
                  node-version: latest
                  check-latest: true

            - name: Blockchain
              working-directory: Blockchain
              run: dotnet build

            - name: Wallet
              working-directory: Wallet
              run: pnpm install && pnpm run start

            - name: Solidity Contracts
              working-directory: Solidity/Contracts
              run: pnpm install && pnpm run start

            - name: Solidity Pokemon
              working-directory: Solidity/Pokemon
              run: pnpm install && pnpm run start
